name: ci

# Mirrors the pre-commit + pre-push gates so a PR or push that bypassed
# the local hooks still gets caught. No Gemini review in CI (credential
# scope + rate limits) — clean-Claude + Gemini are local-only.
#
# C-side matrix lands with the first C translation unit per D008.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-gates:
    name: Python quality gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -e '.[dev]'

      - name: flake8
        # Walks both the numerical-oracle tests/ tree and the ontology
        # tooling/ tree. Matches the Makefile's lint-python target.
        run: flake8 tests tooling

      - name: pylint
        # Uses the repo-committed pylintrc (snapshot of the Google style
        # rcfile). Fails loudly if missing — silent skip would violate
        # the global "all Python passes pylint" rule.
        run: |
          if [ ! -f pylintrc ]; then
            echo "::error::pylintrc missing at repo root — pylint gate can't run."
            exit 1
          fi
          pylint --rcfile=pylintrc tests tooling

      - name: mypy --strict
        # `tests tooling` matches the Makefile's find-based walk. If
        # a loose script lands at e.g. tooling/script.py, CI still
        # sees it; naming specific subdirectories (tooling/src,
        # tooling/tests) would silently miss such files.
        run: mypy --strict tests tooling

      - name: Install C toolchain for test-c + BPF compile
        # clang for userspace C tests (test_pebay_c_driver_passes).
        # clang + libbpf-dev + bpftool + linux-libc-dev for BPF compile +
        # static BTF dump (test_bpf_verify_passes). No in-kernel load
        # happens on CI runners — that's vmtest territory per D012.
        # GitHub Azure runners run an azure-specific kernel, so
        # `linux-tools-generic` won't satisfy the /usr/sbin/bpftool
        # shim. Use linux-tools-$(uname -r) to pick up the exact
        # versioned tools matching the runner's kernel.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libbpf-dev \
            linux-tools-common \
            "linux-tools-$(uname -r)" \
            linux-libc-dev

      - name: Build + run C test suite
        run: make test-c

      - name: Compile + statically verify BPF objects
        run: make bpf-verify

      - name: pytest --cov --cov-branch
        run: pytest

      - name: ontology gate (D010)
        # Rebuild the DAG from YAML (idempotent; no-op if content hash
        # matches) and audit it with --exit-nonzero-on-gap. Catches
        # ref typos + status↔refs inconsistencies.
        run: |
          build-iomoments-ontology
          audit-ontology --exit-nonzero-on-gap

  shell-gates:
    name: Shell script lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          find tooling -type f -name '*.sh' -print0 | xargs -0 -r shellcheck

  c-gates:
    name: C quality gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install C toolchain + libbpf
        # gcc + clang 18 + clang-tidy + clang-format + cppcheck +
        # scan-build (via clang-tools-18). libbpf-dev added so
        # `make lint-c` compile-as-lint of src/*.bpf.c finds
        # bpf_helpers.h. linux-libc-dev so <asm/types.h> resolves.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            clang-18 \
            clang-tidy-18 \
            clang-format-18 \
            clang-tools-18 \
            cppcheck \
            libbpf-dev \
            linux-libc-dev
          sudo ln -sf /usr/bin/clang-18 /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang-tidy-18 /usr/local/bin/clang-tidy
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format
          sudo ln -sf /usr/bin/scan-build-18 /usr/local/bin/scan-build

      - name: fmt-check
        run: make fmt-check

      - name: lint-c (four engines)
        run: make lint-c

      - name: Install bpftool matching runner kernel
        # linux-tools-$(uname -r) pulls in the versioned bpftool the
        # /usr/sbin/bpftool shim dispatches to. On GitHub Azure
        # runners that resolves to linux-tools-<ver>-azure.
        run: |
          sudo apt-get install -y \
            linux-tools-common \
            "linux-tools-$(uname -r)"

      - name: bpf-verify (static BTF inspection)
        # Compiles src/*.bpf.c and runs bpftool btf dump on the outputs.
        # Does NOT load into the runner's kernel (D012). In-kernel
        # verification lives in bpf-test-vm and runs inside a vmtest
        # guest with a purpose-built kernel.
        run: make bpf-verify
