name: ci

# Mirrors the pre-commit + pre-push gates so a PR or push that bypassed
# the local hooks still gets caught. No Gemini review in CI (credential
# scope + rate limits) — clean-Claude + Gemini are local-only.
#
# C-side matrix lands with the first C translation unit per D008.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-gates:
    name: Python quality gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project + dev deps
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -e '.[dev]'

      - name: flake8
        run: flake8 tests

      - name: pylint
        # Uses the repo-committed pylintrc (snapshot of the Google style
        # rcfile). Fails loudly if missing — silent skip would violate
        # the global "all Python passes pylint" rule.
        run: |
          if [ ! -f pylintrc ]; then
            echo "::error::pylintrc missing at repo root — pylint gate can't run."
            exit 1
          fi
          pylint --rcfile=pylintrc tests

      - name: mypy --strict
        run: mypy --strict tests

      - name: pytest --cov --cov-branch
        run: pytest

  shell-gates:
    name: Shell script lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          find tooling -type f -name '*.sh' -print0 | xargs -0 -r shellcheck

  c-gates:
    name: C quality gates
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install C toolchain
        # gcc + clang 18 + clang-tidy + clang-format + cppcheck + scan-build.
        # scan-build is part of clang-tools-18 on Noble. BPF verifier load
        # (bpftool) not installed here — kernel-in-a-box job lands later.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            clang-18 \
            clang-tidy-18 \
            clang-format-18 \
            clang-tools-18 \
            cppcheck
          sudo ln -sf /usr/bin/clang-18 /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang-tidy-18 /usr/local/bin/clang-tidy
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format
          sudo ln -sf /usr/bin/scan-build-18 /usr/local/bin/scan-build

      - name: fmt-check
        run: make fmt-check

      - name: lint-c (four engines)
        run: make lint-c

      - name: bpf-verify (stub)
        # No BPF sources today; target exits 0. Real bpftool prog load
        # lands in a separate kernel-in-a-box job once iomoments.bpf.c
        # exists — GitHub runners' fixed kernels make an in-runner load
        # fragile.
        run: make bpf-verify
